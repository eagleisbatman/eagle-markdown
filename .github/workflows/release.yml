name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            args: ''
            label: Linux
          - platform: windows-latest
            args: ''
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Eagle Markdown ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            Pick the right file for your platform:

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x86_64) |
            | Windows | `.msi` |
            | Linux | `.AppImage` / `.deb` |

            ### macOS — first launch

            Since the app isn't notarized with Apple, macOS will block it on first open.
            **Right-click** the app → **Open** → click **Open** in the dialog. You only need to do this once.

            If you see "damaged", run this in Terminal first:
            ```
            xattr -cr /Applications/Eagle\ Markdown.app
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
